<!-- Cas no_inventory -->
<div class="ubm-holdings-list" *ngIf="physicalAvailability === 'no_inventory'">
  <button class="ubm-holding-row ubm-holding--unknown" (click)="onHoldingClick($event)">

    <!-- Icône livre (colonne gauche) -->
    <span class="ubm-holding-icon ubm-holding-icon--unknown">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4C4 2.9 4.9 2 6 2H18C19.1 2 20 2.9 20 4V20C20 21.1 19.1 22 18 22H6C4.9 22 4 21.1 4 20V4Z" fill="currentColor" opacity="0.15"/>
        <path d="M6 2H18C19.1 2 20 2.9 20 4V20C20 21.1 19.1 22 18 22H6C4.9 22 4 21.1 4 20V4C4 2.9 4.9 2 6 2Z" stroke="currentColor" stroke-width="1.5"/>
        <line x1="8" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8" y1="15" x2="13" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </span>

    <!-- Texte (colonne centrale) -->
    <span class="ubm-holding-body">
      <span class="ubm-holding-status">Dans le réseau</span>
      <span class="ubm-holding-library">{{ 'delivery.code.no_inventory' | translate }}</span>
      <span class="ubm-holding-sublocation">Consulter les modalités d'accès ou de prêt</span>
    </span>

  </button>
</div>

<!-- Liste des holdings -->
<div class="ubm-holdings-list" *ngIf="holdings.length > 0">
  <button
    *ngFor="let holding of holdings"
    class="ubm-holding-row"
    [ngClass]="getConfig(holding).cssClass"
    [attr.aria-label]="getAriaLabel(holding)"
    (click)="onHoldingClick($event)"
  >

    <!-- Icône livre (colonne gauche, centrée verticalement) -->
    <span class="ubm-holding-icon" [ngClass]="'ubm-holding-icon--' + holding.availabilityStatus">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4C4 2.9 4.9 2 6 2H18C19.1 2 20 2.9 20 4V20C20 21.1 19.1 22 18 22H6C4.9 22 4 21.1 4 20V4Z" fill="currentColor" opacity="0.15"/>
        <path d="M6 2H18C19.1 2 20 2.9 20 4V20C20 21.1 19.1 22 18 22H6C4.9 22 4 21.1 4 20V4C4 2.9 4.9 2 6 2Z" stroke="currentColor" stroke-width="1.5"/>
        <line x1="8" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8" y1="15" x2="13" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </span>

    <!-- Texte (colonne centrale) -->
    <span class="ubm-holding-body">
      <span class="ubm-holding-status">{{ getConfig(holding).label | translate }}</span>
      <span class="ubm-holding-library">{{ holding.mainLocation }}</span>
      <span class="ubm-holding-sublocation" *ngIf="holding.subLocation">{{ holding.subLocation }}</span>
      <span class="ubm-holding-callnumber" *ngIf="holding.callNumber">{{ holding.callNumber }}</span>
    </span>

    <!-- Lien carte (coin haut droite) -->
    <a
      *ngIf="holding.stackMapUrl"
      class="ubm-holding-map-link"
      [href]="holding.stackMapUrl"
      target="_blank"
      rel="noopener noreferrer"
      [attr.aria-label]="'Voir la carte pour ' + holding.mainLocation"
      (click)="onMapClick($event)"
    >
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="currentColor"/>
        <circle cx="12" cy="9" r="2.5" fill="white"/>
      </svg>
    </a>

  </button>
</div>
