<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Showcase — Types de documents</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

  :root {
    --pink-light: #FDE8EF;
    --pink-mid:   #F2AFCA;
    --bordeaux:   #9B2456;
    --bordeaux-dark: #6e1a3d;
    --text:       #2a1020;
    --text-muted: #8a5570;
    --bg:         #fdf4f7;
    --card-bg:    #ffffff;
    --border:     #f0d0de;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--bordeaux);
    padding: 2.5rem 3rem 2rem;
    display: flex;
    align-items: flex-end;
    gap: 1.5rem;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: #fff;
    line-height: 1.1;
  }
  header p {
    font-size: 0.85rem;
    color: var(--pink-mid);
    margin-top: 0.3rem;
    font-weight: 300;
    letter-spacing: 0.03em;
  }
  .header-badge {
    background: var(--pink-light);
    color: var(--bordeaux);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 0.3rem 0.8rem;
    border-radius: 2rem;
    text-transform: uppercase;
    margin-bottom: 0.2rem;
  }

  .toolbar {
    padding: 1.2rem 3rem;
    background: white;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.45rem 0.9rem;
    flex: 1;
    max-width: 320px;
  }
  .search-box input {
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    outline: none;
    width: 100%;
  }
  .search-box svg { flex-shrink: 0; }

  .count-badge {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-left: auto;
  }
  #count-num { font-weight: 600; color: var(--bordeaux); }

  main {
    padding: 2rem 3rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 1.2rem;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    padding: 1.2rem 0.8rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    cursor: default;
    transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s;
  }
  .card:hover {
    box-shadow: 0 6px 24px rgba(155,36,86,0.10);
    transform: translateY(-2px);
    border-color: var(--pink-mid);
  }

  .icon-wrap {
    width: 68px;
    height: 98px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-wrap img {
    width: 68px;
    height: 98px;
    object-fit: contain;
  }

  /* Fallback placeholder when image missing */
  .icon-placeholder {
    width: 68px;
    height: 98px;
    background: var(--pink-light);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .icon-placeholder::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 14px 14px 0;
    border-color: transparent var(--pink-mid) transparent transparent;
  }
  .icon-placeholder svg {
    opacity: 0.35;
  }

  .label-fr {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--bordeaux-dark);
    text-align: center;
    line-height: 1.3;
    word-break: break-word;
  }
  .label-en {
    font-size: 0.63rem;
    color: var(--text-muted);
    text-align: center;
    font-weight: 300;
  }
  .code-tag {
    font-size: 0.55rem;
    color: var(--text-muted);
    background: var(--pink-light);
    padding: 0.15rem 0.4rem;
    border-radius: 0.25rem;
    font-family: monospace;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: center;
  }

  .hidden { display: none !important; }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    color: var(--text-muted);
    padding: 3rem;
    font-size: 0.9rem;
  }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-badge">Référentiel</div>
    <h1>Types de documents</h1>
    <p>Showcase des icônes et libellés — référentiel media types</p>
  </div>

<div class="toolbar">
  <div class="search-box">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#9B2456" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="Rechercher un type de document…" oninput="filterCards()"/>
  </div>
  <span class="count-badge"><span id="count-num">0</span> types affichés</span>
</div>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>Types de documents — tous droits réservés</footer>

// Deduplicate by french label (keep first occurrence)
const seen = new Set();
const deduped = data.filter(([code, en, fr]) => {
  const key = fr.toLowerCase();
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

// Sort alphabetically by french label
deduped.sort((a, b) => a[2].localeCompare(b[2], 'fr'));

const placeholder = `<div class="icon-placeholder">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#9B2456" stroke-width="1.5">
    <rect x="4" y="2" width="16" height="20" rx="2"/>
    <line x1="8" y1="8" x2="16" y2="8"/>
    <line x1="8" y1="12" x2="16" y2="12"/>
    <line x1="8" y1="16" x2="12" y2="16"/>
  </svg>
</div>`;

const grid = document.getElementById('grid');

deduped.forEach(([code, en, fr]) => {
  const imgHtml = `<img src="${ASSETS}icon_${code.replace('mediatype.','')}.png" alt="${fr}" onerror="this.parentNode.innerHTML='${placeholder.replace(/"/g,"'")}'">`;

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.search = (fr + ' ' + en + ' ' + code).toLowerCase();
  card.innerHTML = `
    <div class="icon-wrap">${imgHtml}</div>
    <div class="label-fr">${fr}</div>
    <div class="label-en">${en}</div>
    <div class="code-tag">${code.replace('mediatype.','')}</div>
  `;
  grid.appendChild(card);
});

updateCount();

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('hidden', q && !c.dataset.search.includes(q));
  });
  document.querySelector('.no-results')?.remove();
  const visible = document.querySelectorAll('.card:not(.hidden)').length;
  if (visible === 0) {
    const msg = document.createElement('div');
    msg.className = 'no-results';
    msg.textContent = 'Aucun type de document trouvé.';
    grid.appendChild(msg);
  }
  updateCount();
}

function updateCount() {
  const n = document.querySelectorAll('.card:not(.hidden)').length;
  document.getElementById('count-num').textContent = n;
}
